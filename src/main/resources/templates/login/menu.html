<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>メニュー | 会議室予約システム</title>
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: mainHeader}"></div>
<main class="container">
  <section class="card">
    <h2>メニュー</h2>
    <div class="actions">
      <a class="btn btn-primary" th:href="@{/reserve}">会議室予約へ</a>
      <a class="btn" th:href="@{/cancel}">予約キャンセルへ</a>
      <a class="btn" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/top}">管理者ページへ</a>
      <form class="inline" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-danger" type="submit">ログアウト</button>
      </form>
    </div>
  </section>
</main>
</body>
</html>
