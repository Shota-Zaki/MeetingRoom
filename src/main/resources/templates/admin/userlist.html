<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>利用者一覧</h1>
	<table border="1">
		<thead>
			<tr>
				<th>ID</th>
				<th>名前</th>
				<th></th>
				<th></th>
				<th></th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="user:${users}">
				<td th:text="${user.id}"></td>
				<td th:text="${user.name}"></td>
				<td><a th:href="@{/admin/detail/{id}(id=${user.id})}">詳細</a></td>
				<td><a th:href="@{/admin/update/{id}(id=${user.id})}">更新</a></td>
				<td><a th:href="@{/admin/delete/{id}(id=${user.id})}">削除</a></td>
			</tr>
		</tbody>
	</table>
	<a th:href="@{/admin/top}">戻る</a><br>
</body>
</html>
