<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>利用者一覧 | 会議室で会いましょう！</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div th:replace="~{fragments/header :: mainHeader}"></div>
<main class="container"><section class="card"><h2>利用者一覧</h2>
<table><thead><tr><th>ID</th><th>名前</th><th>詳細</th><th>更新</th><th>削除</th></tr></thead><tbody>
<tr th:each="user:${users}"><td th:text="${user.id}"></td><td th:text="${user.name}"></td>
<td><a th:href="|/admin/detail/${user.id}|">詳細</a></td><td><a th:href="|/admin/update/${user.id}|">更新</a></td><td><a th:href="|/admin/delete/${user.id}|">削除</a></td></tr>
</tbody></table></section></main></body></html>
