<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>管理者ページ | 会議室で会いましょう！</title>
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: mainHeader}"></div>
<main class="container"><section class="card">
	<h2>管理者ページ</h2>
	<div class="actions">
		<a class="btn" th:href="@{/admin/list}">ユーザー一覧</a>
		<a class="btn" th:href="@{/admin/create}">ユーザー新規登録</a>
		<a class="btn" th:href="@{/admin/roomlist}">会議室一覧</a>
		<a class="btn" th:href="@{/admin/roomcreate}">会議室新規登録</a>
		<form class="inline" th:action="@{/admin/reservelist}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
			<button class="btn" type="submit">予約一覧</button>
		</form>
	</div>
</section></main>
</body>
</html>
