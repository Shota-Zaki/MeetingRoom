<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>ユーザー更新 | 会議室で会いましょう！</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div th:replace="~{fragments/header :: mainHeader}"></div>
<main class="container"><section class="card"><h2>ユーザー更新</h2>
<form th:action="@{/admin/update}" method="post" th:object="${user}">
<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
<p>ユーザーID:<input type="text" th:field="*{id}" readonly></p><p>名前:<input type="text" th:field="*{name}"></p>
<p>パスワード:<input type="password" th:field="*{password}"></p><p>住所:<input type="text" th:field="*{address}"></p>
<p><select th:field="*{adminflag}"><option value="0">一般</option><option value="1">管理者</option></select></p>
<button class="btn btn-primary" type="submit">更新</button></form></section></main></body></html>
