<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>予約入力 | 会議室で会いましょう！</title>
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: mainHeader}"></div>
<main class="container">
<section class="card">
	<h2>会議室予約</h2>
	<form th:action="@{/reserve}" method="get">
		日付: <input type="date" name="date" th:value="${targetDate}">
		<button class="btn" type="submit">表示</button>
	</form>

	<p class="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

	<table>
		<thead>
			<tr>
				<th>会議室 / 時間</th>
				<th th:each="time : ${timeSlots}" th:text="${time}"></th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="row : ${rows}">
				<th th:text="${row.roomName}"></th>
				<td th:each="cell : ${row.cells}">
					<a class="dot-ok" th:if="${cell.available}"
					   th:href="@{/reserve/confirm(roomId=${cell.roomId},date=${targetDate},start=${cell.start})}">○</a>
					<span class="dot-ng" th:unless="${cell.available}">×</span>
				</td>
			</tr>
		</tbody>
	</table>
</section>
</main>
</body>
</html>
