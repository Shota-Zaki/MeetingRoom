<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>予約キャンセル</title>
<style>
	table, th, td { border: 1px solid #333; border-collapse: collapse; padding: 6px; text-align: center; }
</style>
</head>
<body>
	<h1>予約キャンセル</h1>
	<p>自分の予約のみキャンセル可能です（過去日は対象外）。</p>

	<form th:action="@{/cancel}" method="get">
		日付: <input type="date" name="date" th:value="${targetDate}">
		<input type="submit" value="表示">
	</form>

	<p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></p>

	<table>
		<thead>
			<tr>
				<th>会議室 / 時間</th>
				<th th:each="time : ${timeSlots}" th:text="${time}"></th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="row : ${rows}">
				<th th:text="${row.roomName}"></th>
				<td th:each="cell : ${row.cells}">
					<a th:if="${cell.cancellable}"
					   th:href="@{/cancel/confirm(roomId=${cell.roomId},date=${targetDate},start=${cell.start})}">○</a>
					<span th:unless="${cell.cancellable}">×</span>
				</td>
			</tr>
		</tbody>
	</table>

	<a th:href="@{/topPage}">メニューへ戻る</a>
</body>
</html>
