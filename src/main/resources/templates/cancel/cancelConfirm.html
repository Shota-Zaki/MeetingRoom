<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>キャンセル確認 | 会議室で会いましょう！</title>
<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: mainHeader}"></div>
<main class="container">
<section class="card">
	<h2>キャンセル確認</h2>
	<ul>
		<li>会議室: <span th:text="${room.name}"></span>（<span th:text="${room.id}"></span>）</li>
		<li>利用日: <span th:text="${reservation.date}"></span></li>
		<li>開始時刻: <span th:text="${reservation.start}"></span></li>
		<li>終了時刻: <span th:text="${reservation.end}"></span></li>
		<li>利用者ID: <span th:text="${reservation.userId}"></span></li>
	</ul>

	<form th:action="@{/cancel/confirm}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		<input type="hidden" name="reservationId" th:value="${reservation.id}">
		<input type="hidden" name="date" th:value="${reservation.date}">
		<button class="btn btn-danger" type="submit">キャンセル確定</button>
	</form>

	<div class="actions">
		<a class="btn" th:href="@{/cancel(date=${reservation.date})}">キャンセル入力へ戻る</a>
	</div>
</section>
</main>
</body>
</html>
